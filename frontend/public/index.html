<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e53e3e" />
    <meta name="description" content="MDB RESTROCAFE - Love at First Bite. Order momos, burgers, wings and more!" />
    <meta property="og:title" content="MDB RESTROCAFE" />
    <meta property="og:description" content="Love at First Bite — Order delicious food online" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>MDB RESTROCAFE — Love at First Bite</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    #splash{
      position:fixed;inset:0;z-index:99999;
      background:#0a0a0f;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:0;
      transition:opacity .45s ease, visibility .45s ease;
    }
    #splash.hide{opacity:0;visibility:hidden;pointer-events:none}

    /* ── dual conic rings ── */
    .sp-rings{
      position:relative;
      width:100px;height:100px;
      display:flex;align-items:center;justify-content:center;
    }
    .sp-ring-outer,
    .sp-ring-inner{
      position:absolute;
      border-radius:50%;
      -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3.5px),#000 calc(100% - 3.5px));
      mask:radial-gradient(farthest-side,transparent calc(100% - 3.5px),#000 calc(100% - 3.5px));
    }
    .sp-ring-outer{
      inset:0;
      background:conic-gradient(from 0deg,#c9a84c 0%,rgba(201,168,76,.08) 70%,transparent 100%);
      animation:sp-spin-cw 2s linear infinite;
    }
    .sp-ring-inner{
      inset:16px;
      background:conic-gradient(from 180deg,#f0d060 0%,rgba(240,208,96,.06) 60%,transparent 100%);
      -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 2.5px),#000 calc(100% - 2.5px));
      mask:radial-gradient(farthest-side,transparent calc(100% - 2.5px),#000 calc(100% - 2.5px));
      animation:sp-spin-ccw 1.1s linear infinite;
    }
    .sp-logo{
      width:40px;height:40px;border-radius:14px;
      background:linear-gradient(135deg,#dc2626,#ef4444);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 28px rgba(239,68,68,.45);
      font-family:'Inter',sans-serif;
      font-weight:900;font-size:10px;color:#fff;
      letter-spacing:.05em;
      position:relative;z-index:1;
    }
    .sp-glow{
      width:60px;height:10px;margin-top:-4px;
      background:radial-gradient(ellipse,rgba(201,168,76,.3) 0%,transparent 70%);
      filter:blur(5px);
    }
    .sp-brand{
      margin-top:20px;
      font-family:'Inter',sans-serif;
      font-weight:900;font-size:15px;
      letter-spacing:.12em;
      background:linear-gradient(135deg,#c9a84c,#f0d060,#c9a84c);
      background-size:200% auto;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      animation:sp-shimmer 2.5s linear infinite;
    }
    .sp-sub{
      margin-top:5px;
      font-family:'Inter',sans-serif;
      font-size:10px;font-weight:500;
      letter-spacing:.25em;text-transform:uppercase;
      color:rgba(255,255,255,.2);
    }
    /* progress bar */
    .sp-bar-track{
      margin-top:28px;
      width:140px;height:2px;
      border-radius:99px;
      background:rgba(255,255,255,.07);
      overflow:hidden;
    }
    .sp-bar-fill{
      height:100%;border-radius:99px;
      background:linear-gradient(90deg,#c9a84c,#f0d060);
      box-shadow:0 0 8px rgba(201,168,76,.6);
      animation:sp-progress 1.6s cubic-bezier(.4,0,.2,1) forwards;
    }
    /* dots */
    .sp-dots{
      margin-top:14px;
      display:flex;gap:6px;
    }
    .sp-dots span{
      width:5px;height:5px;border-radius:50%;
      background:rgba(201,168,76,.35);
      animation:sp-dot 1.2s ease-in-out infinite;
    }
    .sp-dots span:nth-child(2){animation-delay:.2s}
    .sp-dots span:nth-child(3){animation-delay:.4s}

    @keyframes sp-spin-cw  {to{transform:rotate(360deg)}}
    @keyframes sp-spin-ccw {to{transform:rotate(-360deg)}}
    @keyframes sp-shimmer  {
      0%{background-position:0% center}
      100%{background-position:200% center}
    }
    @keyframes sp-progress {
      0%  {width:0%}
      60% {width:75%}
      100%{width:100%}
    }
    @keyframes sp-dot {
      0%,80%,100%{transform:scale(.6);opacity:.3}
      40%{transform:scale(1.1);opacity:1;background:rgba(201,168,76,.9)}
    }
  </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Splash screen — hidden by React once app mounts -->
    <div id="splash">
      <div class="sp-rings">
        <div class="sp-ring-outer"></div>
        <div class="sp-ring-inner"></div>
        <div class="sp-logo">MDB</div>
      </div>
      <div class="sp-glow"></div>
      <p class="sp-brand">MDB RESTROCAFE</p>
      <p class="sp-sub">Love at First Bite</p>
      <div class="sp-bar-track"><div class="sp-bar-fill"></div></div>
      <div class="sp-dots"><span></span><span></span><span></span></div>
    </div>

    <div id="root"></div>

    <script>
      // Hide splash once React root has painted
      var _obs = new MutationObserver(function(){
        var root = document.getElementById('root');
        if(root && root.children.length > 0){
          setTimeout(function(){
            var s = document.getElementById('splash');
            if(s){ s.classList.add('hide'); setTimeout(function(){ s.remove(); },500); }
          }, 300);
          _obs.disconnect();
        }
      });
      _obs.observe(document.getElementById('root'),{childList:true,subtree:true});
    </script>
  </body>
</html>
