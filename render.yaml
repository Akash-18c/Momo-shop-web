services:
  - type: web
    name: mdb-restrocafe-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start

  - type: web
    name: mdb-restrocafe-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
